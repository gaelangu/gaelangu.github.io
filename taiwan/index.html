<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#120F0C">
<meta name="robots" content="noindex, nofollow">
<title>台灣 · Taiwan</title>
<meta name="description" content="Private family trip page.">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%87%B9%F0%9F%87%BC%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Albert+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

<style>
  :root{
    --page:#171310; --paper:#211B16; --paper-2:#2B241D; --paper-3:#352C24;
    --line:rgba(245,238,228,.12); --line-2:rgba(245,238,228,.20);
    --ink:#F5EEE4; --ink-soft:rgba(245,238,228,.62); --ink-faint:rgba(245,238,228,.4);
    --amber:#F3C48C; --amber-deep:#E5AC6E;
    --jade:#9DDCC4; --jade-soft:rgba(157,220,196,.13);
    --rose:#F3AFBA; --rose-soft:rgba(243,175,186,.13);
    --sky:#AECBEF; --gold:#EDD8A8; --purple:#CFC2F2; --warm:#F5C3AC; --brown:#DCC2A2;
    --radius:18px; --shadow:0 16px 38px -20px rgba(0,0,0,.6);
    --hero-grad:linear-gradient(165deg,#1d1712 0%,#272019 45%,#302620 70%,#3b2e23 100%);
    --tabbar-bg:rgba(23,19,16,.92);
    --skyline-fill:rgba(16,11,7,.8); --skyline-101:rgba(36,26,16,.96); --skyline-win:rgba(255,199,130,.95); --skyline-mist:rgba(255,240,220,.14);
    color-scheme:dark;
  }
  :root[data-theme="light"]{
    --page:#F8F2E9; --paper:#FFFDF8; --paper-2:#F4ECDF; --paper-3:#ECE1CF;
    --line:rgba(70,54,38,.13); --line-2:rgba(70,54,38,.22);
    --ink:#3A2C1E; --ink-soft:rgba(58,44,30,.64); --ink-faint:rgba(58,44,30,.44);
    --amber:#E5B180; --amber-deep:#D69D66;
    --jade:#84C7AD; --jade-soft:rgba(132,199,173,.18);
    --rose:#E5A3AF; --rose-soft:rgba(229,163,175,.16);
    --sky:#9BBCE5; --gold:#D9BE8C; --purple:#B9A8E2; --warm:#E5B29B; --brown:#C4A882;
    --shadow:0 14px 30px -20px rgba(120,96,60,.35);
    --hero-grad:linear-gradient(165deg,#fdf0dd 0%,#f9e6cb 45%,#f5dcbb 70%,#f0d0a4 100%);
    --tabbar-bg:rgba(250,244,235,.9);
    --skyline-fill:rgba(58,36,20,.45); --skyline-101:rgba(46,28,14,.72); --skyline-win:rgba(184,104,32,.9); --skyline-mist:rgba(255,255,255,.4);
    color-scheme:light;
  }
  /* one-shot transition only while toggling theme (keeps hovers/renders cheap) */
  html.theming, html.theming *{transition:background-color .45s ease, color .45s ease, border-color .45s ease, box-shadow .45s ease, fill .45s ease, stroke .45s ease !important}
  /* light-mode fixes: pastel accents need darker text on cream */
  [data-theme="light"] .tag.family{color:#2e7d5f}
  [data-theme="light"] .tag.inlaws{color:#b25a6a}
  [data-theme="light"] .mini.near{color:#2e7d5f}
  [data-theme="light"] .fl-top .fl-dir{color:#2e7d5f}
  [data-theme="light"] .langsw{background:rgba(0,0,0,.04)}
  [data-theme="light"] #toast{color:#3A2C1E}
  [data-theme="light"] .kicker,[data-theme="light"] .day-kicker,
  [data-theme="light"] .daycard .dn,[data-theme="light"] .loc-list .ll-h{color:#B9803F}
  [data-theme="light"] a{color:#3E8B6C}
  [data-theme="light"] .pp .valid,[data-theme="light"] .pack-cat .cnt{color:#2e7d5f}
  [data-theme="light"] .loc-kid{color:#a35b32}
  [data-theme="light"] .loc-kid b{color:#a35b32}
  [data-theme="light"] .stars{color:#c39b3a}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{
    margin:0;background:var(--page);color:var(--ink);
    font-family:"Albert Sans","Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  h1,h2,h3,h4,.serif{font-family:"Young Serif","Noto Serif TC",Georgia,serif;font-weight:400}
  [data-lang="zh"] body,[data-lang="zh"] .body-txt{font-family:"Noto Sans TC","Albert Sans",sans-serif}
  .mono{font-family:"Space Grotesk","Noto Sans TC",monospace}
  a{color:var(--jade);text-underline-offset:2px}
  ::selection{background:rgba(247,169,59,.4);color:#120F0C}
  img{max-width:100%;display:block}
  button{font-family:inherit}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:6px}

  /* ============ PIN GATE ============ */
  #gate{
    position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:28px;text-align:center;
    background:
      radial-gradient(120% 80% at 50% -10%,rgba(247,169,59,.16),transparent 60%),
      radial-gradient(90% 70% at 50% 120%,rgba(84,193,160,.12),transparent 60%),
      #120F0C;
  }
  /* lock gate stays dark regardless of the app theme */
  .gate-title{color:#F3ECE0}
  .pin-box{background:#1C1712 !important;color:#F3ECE0 !important;border-color:rgba(243,236,224,.22) !important}
  #gate.err .pin-box{border-color:#E86A7C !important}
  #gate.success .pin-box{border-color:#54C1A0 !important}
  .gate-msg{color:#E86A7C}
  .gate-msg.busy{color:rgba(243,236,224,.62)}
  @keyframes pinSuccess{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}
  #gate.success .pin-box{border-color:var(--jade)!important;background:rgba(84,193,160,.14);animation:pinSuccess .42s ease}
  #gate.success .gate-mark{animation:pinSuccess .5s ease}
  @keyframes irisOut{to{clip-path:circle(0% at 50% 42%);-webkit-clip-path:circle(0% at 50% 42%)}}
  #gate{clip-path:circle(150% at 50% 42%);-webkit-clip-path:circle(150% at 50% 42%)}
  #gate.wiping{animation:irisOut .85s cubic-bezier(.65,0,.35,1) forwards;pointer-events:none}
  .gate-mark{font-size:40px;line-height:1;margin-bottom:14px}
  .gate-title{font-family:"Young Serif","Noto Serif TC",serif;font-size:clamp(2rem,9vw,3rem);margin:0 0 40px}
  .pin-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:nowrap}
  .pin-box{
    width:40px;height:52px;border-radius:11px;border:1.5px solid var(--line-2);
    background:var(--paper);color:var(--ink);text-align:center;
    font-family:"Space Grotesk",monospace;font-size:1.45rem;font-weight:600;
    transition:border-color .15s ease,transform .1s ease,box-shadow .15s ease;
    -webkit-appearance:none;appearance:none;
  }
  @media (max-width:430px){
    .pin-row{gap:6px}
    .pin-box{width:32px;height:46px;font-size:1.2rem;border-radius:9px}
  }
  .gate-nolink{max-width:24em;color:rgba(243,236,224,.75);font-size:.95rem;line-height:1.6}
  .pin-box:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(247,169,59,.18);outline:none}
  .pin-box.filled{border-color:var(--amber-deep)}
  #gate.err .pin-box{border-color:var(--rose)}
  #gate.err .pin-row{animation:shake .4s ease}
  @keyframes shake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(5px)}50%{transform:translateX(-7px)}}
  .gate-msg{min-height:22px;font-size:.9rem;color:var(--rose)}
  .gate-msg.busy{color:var(--ink-soft)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--ink-faint);
    border-top-color:var(--amber);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ============ APP SHELL ============ */
  #app{display:none}
  #app.on{display:block;opacity:1}
  @keyframes appReveal{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  #app.on.reveal{animation:appReveal .7s cubic-bezier(.19,.85,.24,1) .3s both}
  #app{transition:opacity .3s ease,transform .3s ease,filter .3s ease}
  #app.lang-dim{opacity:.3;transform:scale(.985);filter:saturate(.6)}
  /* language sweep: skewed light band crosses the screen while content swaps beneath it */
  #langwipe{position:fixed;inset:0;z-index:1200;pointer-events:none;overflow:hidden;display:none}
  #langwipe.run{display:block}
  #langwipe .band{position:absolute;top:-25%;bottom:-25%;left:0;width:70%;
    transform:translateX(-130%) skewX(-10deg);
    background:linear-gradient(100deg,transparent 0%,rgba(247,169,59,.12) 18%,var(--amber) 44%,var(--jade) 58%,rgba(84,193,160,.12) 84%,transparent 100%);
    opacity:.94}
  #langwipe.run .band{animation:langSweep 1s cubic-bezier(.72,.04,.26,.96) forwards}
  #langwipe .band.b2{width:36%;opacity:.5;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.5) 50%,transparent)}
  #langwipe.run .band.b2{animation-delay:.08s;animation-duration:1.05s}
  @keyframes langSweep{to{transform:translateX(330%) skewX(-10deg)}}
  /* staggered re-entry of freshly rendered content */
  .lang-stagger>*{animation:langItem .6s cubic-bezier(.2,.9,.27,1) both}
  .lang-stagger>*:nth-child(1){animation-delay:.04s}.lang-stagger>*:nth-child(2){animation-delay:.09s}
  .lang-stagger>*:nth-child(3){animation-delay:.14s}.lang-stagger>*:nth-child(4){animation-delay:.19s}
  .lang-stagger>*:nth-child(5){animation-delay:.24s}.lang-stagger>*:nth-child(6){animation-delay:.29s}
  .lang-stagger>*:nth-child(7){animation-delay:.34s}.lang-stagger>*:nth-child(8){animation-delay:.38s}
  .lang-stagger>*:nth-child(n+9){animation-delay:.42s}
  @keyframes langItem{from{opacity:0;transform:translateY(18px) scale(.985)}to{opacity:1;transform:none}}
  .wrap{max-width:900px;margin:0 auto;padding:0 18px}

  /* Hero */
  .hero{
    position:relative;overflow:hidden;padding:calc(env(safe-area-inset-top) + 26px) 0 20px;
    background:var(--hero-grad);
    border-bottom:1px solid var(--line);
  }
  .hero::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(80% 60% at 82% 0%,rgba(247,169,59,.22),transparent 55%),
               radial-gradient(70% 60% at 6% 100%,rgba(84,193,160,.14),transparent 55%);}
  .hero-skyline{position:absolute;left:0;right:0;bottom:0;width:100%;
    height:clamp(76px,19vw,150px);z-index:1;pointer-events:none;opacity:.92}
  .hero-skyline .bld{fill:var(--skyline-fill)}
  .hero-skyline .t101{fill:var(--skyline-101)}
  .hero-skyline .win rect{fill:var(--skyline-win);animation:skyTwinkle 4.6s ease-in-out infinite}
  .hero-skyline .win rect:nth-child(2n){animation-delay:1.1s}
  .hero-skyline .win rect:nth-child(3n){animation-delay:2.3s}
  .hero-skyline .win rect:nth-child(5n){animation-delay:.6s}
  .hero-skyline .win rect:nth-child(7n){animation-delay:1.8s}
  @keyframes skyTwinkle{0%,100%{opacity:.2}50%{opacity:1}}
  .hero-skyline .beacon{fill:#ff6b57;animation:skyBeacon 2.2s ease-in-out infinite}
  @keyframes skyBeacon{0%,100%{opacity:.25}50%{opacity:1}}
  .hero-skyline .mist{fill:var(--skyline-mist)}
  .hero-skyline .mist-a{animation:skyDriftA 26s ease-in-out infinite alternate}
  .hero-skyline .mist-b{animation:skyDriftB 34s ease-in-out infinite alternate}
  @keyframes skyDriftA{from{transform:translateX(-3%)}to{transform:translateX(3%)}}
  @keyframes skyDriftB{from{transform:translateX(4%)}to{transform:translateX(-4%)}}
  .hero-top{position:relative;z-index:2;display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-bottom:14px}
  .langsw{display:inline-flex;border:1px solid var(--line-2);border-radius:999px;overflow:hidden;background:rgba(0,0,0,.2)}
  .langsw button{border:0;background:transparent;color:var(--ink-soft);font-size:12.5px;font-weight:600;
    padding:6px 12px;cursor:pointer;transition:background .15s,color .15s;font-family:"Space Grotesk","Noto Sans TC",sans-serif}
  .langsw button.on{background:var(--amber);color:#241a12}
  .hero-actions{display:inline-flex;align-items:center;gap:8px}
  #theme-btn{position:relative;width:34px;height:34px;flex:none;border-radius:50%;border:1px solid var(--line-2);
    background:rgba(0,0,0,.2);color:var(--ink-soft);cursor:pointer;display:grid;place-items:center;
    -webkit-tap-highlight-color:transparent;transition:color .15s,background .15s,transform .1s}
  [data-theme="light"] #theme-btn{background:rgba(0,0,0,.04)}
  #theme-btn:hover{color:var(--ink)}
  #theme-btn:active{transform:scale(.9)}
  #theme-btn svg{position:absolute;width:18px;height:18px;fill:currentColor;
    transition:opacity .4s ease,transform .55s cubic-bezier(.34,1.56,.64,1)}
  #theme-btn .i-sun{opacity:0;transform:rotate(-90deg) scale(.3)}
  #theme-btn .i-moon{opacity:1;transform:rotate(0) scale(1)}
  [data-theme="light"] #theme-btn .i-sun{opacity:1;transform:rotate(0) scale(1)}
  [data-theme="light"] #theme-btn .i-moon{opacity:0;transform:rotate(90deg) scale(.3)}
  .hero h1{position:relative;z-index:2;font-size:clamp(2.8rem,13vw,5rem);line-height:1;margin:0 0 8px;letter-spacing:-.01em}
  .hero .sub{position:relative;z-index:2;color:var(--ink);font-size:1.02rem;margin:0 0 4px}
  .hero .who{position:relative;z-index:2;color:var(--ink-soft);font-size:.9rem;margin:0}
  .chips{position:relative;z-index:2;display:flex;flex-wrap:wrap;gap:7px;margin-top:16px}
  .chip{font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:12px;font-weight:600;color:var(--ink);
    background:var(--paper);border:1px solid var(--line-2);padding:6px 11px;border-radius:999px;white-space:nowrap;
    box-shadow:0 2px 10px -4px rgba(0,0,0,.4)}

  /* Tabs */
  .tabbar{position:sticky;top:0;z-index:400;background:var(--tabbar-bg);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .tabbar-inner{display:flex;gap:4px;padding:9px 12px;max-width:900px;margin:0 auto;overflow-x:auto;scrollbar-width:none}
  .tabbar-inner::-webkit-scrollbar{display:none}
  .tab{font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:13px;font-weight:600;
    border:1px solid transparent;background:transparent;color:var(--ink-soft);
    padding:8px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
  .tab:hover{background:rgba(243,236,224,.07);color:var(--ink)}
  .tab.active{background:var(--amber);color:#241a12}

  main{padding:26px 0 60px;position:relative}
  .panel{display:none}
  .panel.show{display:block;animation:panelIn .4s cubic-bezier(.22,.9,.32,1) both}
  .panel.leaving{display:block;position:absolute;left:0;right:0;animation:panelOut .18s ease both}
  @keyframes panelIn{from{opacity:0;transform:translateY(14px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes panelOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-8px) scale(.99)}}
  .tl-enter{animation:panelIn .4s cubic-bezier(.22,.9,.32,1) both}
  .sec-head{margin:2px 0 18px}
  .kicker{font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:11.5px;font-weight:600;
    letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin:0 0 6px}
  .sec-head h2{font-size:clamp(1.6rem,5vw,2.2rem);margin:0 0 6px;line-height:1.15}
  .sec-head p{color:var(--ink-soft);margin:0;max-width:42em;font-size:.95rem}

  /* Stays */
  .stay{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:16px 17px;margin-bottom:14px}
  .stay-img{margin:-16px -17px 13px;height:170px;overflow:hidden;border-radius:var(--radius) var(--radius) 0 0;background:var(--paper-2)}
  .stay-img img{width:100%;height:100%;object-fit:cover;display:block}
  .stay-top{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
  .stay h3{font-size:1.15rem;margin:0}
  .stay .tag{font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;padding:3px 8px;border-radius:999px}
  .tag.family{background:var(--jade-soft);color:#8fe0c6;border:1px solid rgba(84,193,160,.4)}
  .tag.inlaws{background:var(--rose-soft);color:#f6a3b1;border:1px solid rgba(232,106,124,.4)}
  .tag.sm{font-size:9.5px;padding:2px 7px}
  .stay .place{color:var(--ink-soft);font-size:.86rem;margin:2px 0 0}
  .stay-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 16px;margin:13px 0 0}
  .kv{font-size:.9rem}
  .kv .k{font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.05em;
    text-transform:uppercase;color:var(--ink-faint);display:block;margin-bottom:1px}
  .kv .v{color:var(--ink)}
  .copy{cursor:pointer;border-bottom:1px dashed var(--line-2);transition:color .15s}
  .copy:hover{color:var(--amber)}
  .stay .notes{margin:12px 0 0;padding-top:11px;border-top:1px dashed var(--line);color:var(--ink-soft);font-size:.88rem}
  .stay .actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .btn{font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:12.5px;font-weight:600;
    border:1px solid var(--line-2);background:var(--paper-2);color:var(--ink);
    padding:8px 13px;border-radius:10px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
    transition:background .15s,border-color .15s,transform .1s}
  .btn:hover{background:var(--paper-3);border-color:var(--line-2)}
  .btn:active{transform:translateY(1px)}
  .btn.amber{background:var(--amber);color:#241a12;border-color:var(--amber)}
  .split-note{background:var(--paper);border:1px dashed var(--line-2);border-radius:14px;padding:13px 15px;color:var(--ink-soft);font-size:.9rem;margin-bottom:16px}
  .split-note b{color:var(--ink)}

  /* Day strip */
  .daystrip{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:8px}
  .daycard{text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px 13px;cursor:pointer;transition:border-color .15s,transform .1s}
  .daycard:hover{border-color:var(--amber);transform:translateY(-1px)}
  .daycard .dn{font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:11px;font-weight:700;color:var(--amber);letter-spacing:.06em}
  .daycard .dt{font-size:1rem;margin:3px 0 2px;font-family:"Young Serif","Noto Serif TC",serif}
  .daycard .dd{font-size:.8rem;color:var(--ink-soft)}

  /* Day selector + timeline */
  .daysel{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none}
  .daysel::-webkit-scrollbar{display:none}
  .daysel button{flex:none;font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:12.5px;font-weight:600;
    border:1px solid var(--line-2);background:var(--paper);color:var(--ink-soft);padding:8px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}
  .daysel button.on{background:var(--amber);color:#241a12;border-color:var(--amber)}
  .daysel button .wd{opacity:.7;font-weight:500}
  .day-hd{margin-bottom:4px}
  .day-hd .base{display:inline-flex;align-items:center;gap:7px;font-family:"Space Grotesk","Noto Sans TC",sans-serif;
    font-size:11.5px;font-weight:600;color:var(--ink-soft);margin-bottom:8px}
  .day-hd h3{font-size:1.5rem;margin:0 0 6px}
  .day-hd .theme{color:var(--ink-soft);font-size:.93rem;margin:0 0 4px;max-width:44em}
  .timeline{position:relative;margin:0;padding-left:60px}
  .timeline::before{content:"";position:absolute;left:42px;top:8px;bottom:14px;border-left:2px dotted var(--line-2)}
  .stop{position:relative;margin-bottom:12px}
  .stop-time{position:absolute;left:-60px;top:14px;width:44px;text-align:center;
    font-family:"Space Grotesk",monospace;font-size:11px;font-weight:700;color:var(--ink);
    background:var(--paper-2);border:1px solid var(--line);border-radius:7px;padding:3px 0}
  .stop::before{content:"";position:absolute;left:-22px;top:18px;width:9px;height:9px;border-radius:50%;

      '</div>'+
      '<div class="itin-wrap">'+
        '<div class="itin-timeline-col">'+
          '<div class="timeline tl-enter">'+stops+'</div>'+
        '</div>'+
        '<div class="itin-map-col"><div id="itin-map"></div></div>'+
      '</div>';
    var ds=document.getElementById('daysel');
    ds.addEventListener('click',function(e){var b=e.target.closest('[data-daysel]');if(b){curDay=+b.getAttribute('data-daysel');renderDays();}});
    var on=ds.querySelector('.on'); if(on)on.scrollIntoView({inline:'center',block:'nearest'});
    if(activeTab==='days'){ ensureItinMap(); renderDayMarkers(d); setupStopInteractions(); }
  }

  /* ---------- POOLS (coffee / eat / explore) ---------- */
  function renderPools(){
    var coffee=DATA.locations.filter(function(l){return l.category==='coffee';});
    document.getElementById('p-coffee').innerHTML=
      '<div class="sec-head"><p class="kicker">'+t('coffee_kick')+'</p><h2>'+t('coffee_h')+'</h2><p class="body-txt">'+t('coffee_p')+'</p></div>'+
      '<div class="grid">'+coffee.map(locCard).join('')+'</div>';
    var eat=DATA.locations.filter(function(l){return l.category==='food'||l.category==='nightmarket';});
    document.getElementById('p-eat').innerHTML=
      '<div class="sec-head"><p class="kicker">'+t('eat_kick')+'</p><h2>'+t('eat_h')+'</h2><p class="body-txt">'+t('eat_p')+'</p></div>'+
      '<div class="grid">'+eat.map(locCard).join('')+'</div>';
    // explore with filters
    var exCats=['hotspring','activity','landmark','daytrip','shopping'];
    var ex=DATA.locations.filter(function(l){return exCats.indexOf(l.category)>=0;});
    var present=exCats.filter(function(c){return ex.some(function(l){return l.category===c;});});
    var chips='<button data-exf="all" class="on">'+t('all')+'</button>'+present.map(function(c){
      return '<button data-exf="'+c+'">'+(CATS[c].e)+' '+(CATS[c][lang]||CATS[c].en)+'</button>';}).join('');
    document.getElementById('p-explore').innerHTML=
      '<div class="sec-head"><p class="kicker">'+t('explore_kick')+'</p><h2>'+t('explore_h')+'</h2><p class="body-txt">'+t('explore_p')+'</p></div>'+
      '<div class="filters" id="exFilters">'+chips+'</div>'+
      '<div class="grid" id="exGrid">'+ex.map(locCard).join('')+'</div>';
    var ef=document.getElementById('exFilters');
    ef.addEventListener('click',function(e){var b=e.target.closest('[data-exf]');if(!b)return;
      ef.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');
      var f=b.getAttribute('data-exf');
      document.getElementById('exGrid').innerHTML=ex.filter(function(l){return f==='all'||l.category===f;}).map(locCard).join('');
    });
  }

  /* ---------- ITINERARY MAP (inline, scroll-synced) ---------- */
  function mkIcon(cat,isStay,isActive){
    var C=CATS[cat]||CATS.landmark;
    return L.divIcon({className:'',html:'<div class="mk'+(isStay?' hotel':'')+(isActive?' active':'')+'" style="background:'+(isStay?'#fff':C.c)+'"><span>'+(isStay?'🏨':C.e)+'</span></div>',
      iconSize:isStay?[40,40]:[26,26],iconAnchor:isStay?[20,20]:[13,24],popupAnchor:[0,isStay?-22:-22]});
  }
  function destroyItinMap(){
    if(itinMap){try{itinMap.remove();}catch(e){}itinMap=null;}
    itinMarkers={}; itinStayMarker=null; activeStopId=null;
  }
  function ensureItinMap(){
    destroyItinMap();
    if(!document.getElementById('itin-map'))return;
    itinMap=L.map('itin-map',{scrollWheelZoom:false,zoomControl:true}).setView([25.06,121.53],12);
    // Voyager in both themes; dark mode recolors tiles via CSS filter (colorful dark)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
      attribution:'&copy; OpenStreetMap, &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(itinMap);
    setTimeout(function(){if(itinMap)itinMap.invalidateSize();},60);
  }
  function renderDayMarkers(d){
    if(!itinMap)return;
    var pts=[];
    var stay=DATA.stays.filter(function(s){return s.id===d.base;})[0];
    if(stay){
      itinStayMarker=L.marker([stay.lat,stay.lng],{icon:mkIcon('hotspring',true),zIndexOffset:900}).addTo(itinMap);
      itinStayMarker.bindPopup('<div class="pop"><h4>🏨 '+esc(Lf(stay,'name'))+'</h4><p class="pr">'+esc(Lf(stay,'sub'))+'</p></div>');
      pts.push([stay.lat,stay.lng]);
    }
    d.stops.forEach(function(s){
      if(!s.ref)return;
      var loc=LOC[s.ref]; if(!loc)return;
      var m=L.marker([loc.lat,loc.lng],{icon:mkIcon(loc.category)}).addTo(itinMap);
      m.bindPopup('<div class="pop"><h4>'+esc(Lf(loc,'name'))+'</h4><p class="pr">'+(loc.rating?'★ '+loc.rating+' · ':'')+esc(loc.area||'')+'</p>'+
        '<a href="'+esc(gmaps(loc))+'" target="_blank" rel="noopener">'+t('map_btn')+' ↗</a></div>');
      itinMarkers[loc.id]=m;
      pts.push([loc.lat,loc.lng]);
    });
    // focusZoom = the zoom hover/click flies to; start with a whole-day overview
    if(pts.length>1){
      var b=L.latLngBounds(pts);
      focusZoom=Math.min(15,Math.max(12,itinMap.getBoundsZoom(b)+1));
      itinMap.fitBounds(b,{padding:[36,36],maxZoom:15});
    } else if(pts.length===1){ focusZoom=15; itinMap.setView(pts[0],14,{animate:false}); }
  }
  function setActiveStopVisual(id){
    if(!id||id===activeStopId)return;
    if(activeStopId&&itinMarkers[activeStopId]){
      var prevEl=itinMarkers[activeStopId].getElement();
      if(prevEl){var pm=prevEl.querySelector('.mk');if(pm)pm.classList.remove('active');}
    }
    activeStopId=id;
    document.querySelectorAll('.stop[data-loc]').forEach(function(el){
      el.classList.toggle('active',el.getAttribute('data-loc')===id);
    });
    var m=itinMarkers[id];
    if(m){var mel=m.getElement(); if(mel){var mk=mel.querySelector('.mk'); if(mk)mk.classList.add('active');}}
  }
  /* Map moves ONLY on hover/click of a stop tile — never on scroll. */
  function panToStop(id){
    var m=itinMarkers[id];
    if(!m||!itinMap)return;
    setActiveStopVisual(id);
    itinMap.flyTo(m.getLatLng(),focusZoom,{duration:.55});
  }
  function setupStopInteractions(){
    [].slice.call(document.querySelectorAll('#p-days .stop[data-loc]')).forEach(function(el){
      el.addEventListener('mouseenter',function(){panToStop(el.getAttribute('data-loc'));});
    });
  }
  function focusItinStop(id){ // click on a tile: pan + open the marker popup
    panToStop(id);
    var m=itinMarkers[id];
    if(m)setTimeout(function(){m.openPopup();},600);
  }

  /* ---------- INFO ---------- */
  function renderInfo(){
    var fl=DATA.flights;
    var flLegs='', flPax='';
    if(fl){
      flLegs=fl.legs.map(function(leg){
        return '<div class="fl-leg"><div class="fl-top">'+
          '<span class="fl-dir">'+(leg.dir_en==='Depart'?t('depart_lbl'):t('return_lbl'))+'</span>'+
          '<span class="fl-num">'+esc(leg.flight)+'</span>'+
          '<span class="fl-date">'+esc(lang==='zh'?leg.date_zh:leg.date_en)+'</span></div>'+
          '<div class="fl-route">'+
            '<div class="fl-pt"><b>'+esc(leg.from_time)+'</b><span>'+esc(lang==='zh'?leg.from_zh:leg.from_en)+'</span></div>'+
            '<div class="fl-arrow">✈<br>'+esc(leg.duration)+'</div>'+
            '<div class="fl-pt"><b>'+esc(leg.to_time)+'</b><span>'+esc(lang==='zh'?leg.to_zh:leg.to_en)+'</span></div>'+
          '</div>'+
          '<div class="fl-meta">'+esc(leg.aircraft)+'</div></div>';
      }).join('');
      flPax='<div class="fl-pax-grid">'+fl.passengers.map(function(p){
        function fld(k,v){if(!v)return '';return '<div class="field" data-copy="'+esc(v)+'"><div class="fk">'+esc(k)+'<span class="cpy">⧉</span></div><div class="fv">'+esc(v)+'</div></div>';}
        return '<div class="pp"><div class="pp-top"><h3>'+esc(p.name)+'</h3></div>'+
          '<div class="pp-grid" style="grid-template-columns:1fr 1fr">'+fld(t('seat'),p.seat)+fld(t('krisflyer'),p.krisflyer)+'</div></div>';
      }).join('')+'</div>';
    }
    var pp=DATA.passports.map(function(p){
      function fld(k,v){return '<div class="field" data-copy="'+esc(v)+'"><div class="fk">'+esc(k)+'<span class="cpy">⧉</span></div><div class="fv">'+esc(v)+'</div></div>';}
      return '<div class="pp"><div class="pp-top"><h3>'+esc(p.name)+'</h3></div>'+
        '<div class="pp-grid">'+fld(t('conf').replace(/.*/,lang==='zh'?'護照號碼':'Passport No.'),p.number)+
          fld(lang==='zh'?'發照日':'Issued',p.issue)+fld(lang==='zh'?'到期日':'Expires',p.expiry)+'</div>'+
        '<div class="valid">'+t('valid')+'</div></div>';
    }).join('');
    var pack=DATA.packing.map(function(c,ci){
      var items=c.items.map(function(it,i){var key='p'+ci+'-'+i;
        return '<label><input type="checkbox" data-pack="'+key+'"'+(packState[key]?' checked':'')+'><span>'+esc(it[lang]||it.en)+'</span></label>';}).join('');
      return '<div class="pack-cat" data-packcat="'+ci+'"><div class="ph"><h3 class="body-txt">'+esc(c['cat_'+lang]||c.cat_en)+'</h3><span class="cnt" data-cnt="'+ci+'"></span></div>'+
        '<div class="pack-list">'+items+'</div></div>';
    }).join('');
    var logi=DATA.logistics.map(function(g){
      return '<div class="info"><h3>'+g.icon+' '+esc(g['topic_'+lang]||g.topic_en)+'</h3><p class="body-txt">'+esc(g['body_'+lang]||g.body_en)+'</p></div>';
    }).join('');
    document.getElementById('p-info').innerHTML=
      '<div class="sec-head"><p class="kicker">'+t('info_kick')+'</p><h2>'+t('info_h')+'</h2></div>'+
      (fl?(
      '<h3 class="serif" style="font-size:1.25rem;margin:8px 0 4px">✈️ '+t('flights_h')+'</h3>'+
      '<div class="fl-ref"><span class="fk">'+t('booking_ref')+'</span><span class="fv" data-copy="'+esc(fl.ref)+'">'+esc(fl.ref)+'</span></div>'+
      flLegs+flPax):'')+
      '<h3 class="serif" style="font-size:1.25rem;margin:26px 0 4px">🛂 '+t('passports_h')+'</h3>'+
      '<p style="color:var(--ink-soft);font-size:.88rem;margin:0 0 12px">'+t('passports_p')+'</p>'+pp+
      '<h3 class="serif" style="font-size:1.25rem;margin:26px 0 12px">🎒 '+t('packing_h')+'</h3>'+pack+
      '<h3 class="serif" style="font-size:1.25rem;margin:26px 0 12px">💡 '+t('logistics_h')+'</h3><div class="infogrid">'+logi+'</div>';
    updatePackCounts();
  }
  function updatePackCounts(){
    document.querySelectorAll('[data-packcat]').forEach(function(cat){
      var boxes=cat.querySelectorAll('input[data-pack]'),done=0;
      boxes.forEach(function(b){if(b.checked)done++;});
      var c=cat.querySelector('[data-cnt]'); if(c)c.textContent=done+'/'+boxes.length;
    });
  }

  /* ---------- language switch ----------
     Choreography: a skewed light band sweeps across the screen; while it covers
     the content the page re-renders in the new language, dimmed and slightly
     scaled back; then everything re-enters with a top-to-bottom stagger. */
  var langAnimating=false;
  document.querySelectorAll('[data-lang-btn]').forEach(function(b){
    b.addEventListener('click',function(){
      var newLang=b.getAttribute('data-lang-btn');
      if(newLang===lang||langAnimating)return;
      lang=newLang; save('tw_lang',lang);
      if(!DATA){return;} // gate still showing — nothing to re-render yet
      var appEl=document.getElementById('app');
      var wipe=document.getElementById('langwipe');
      var reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if(reduced){renderAll();return;}
      langAnimating=true;
      appEl.classList.remove('reveal'); // a finished fill-mode animation would pin opacity
      wipe.classList.remove('run'); void wipe.offsetWidth; // restart band animation
      wipe.classList.add('run');
      appEl.classList.add('lang-dim');
      setTimeout(function(){ // band is over the content — swap language now
        renderAll();
        appEl.classList.remove('lang-dim');
        var targets=[document.getElementById('p-'+activeTab),document.querySelector('.hero .wrap')];
        targets.forEach(function(el){if(el)el.classList.add('lang-stagger');});
        setTimeout(function(){
          targets.forEach(function(el){if(el)el.classList.remove('lang-stagger');});
          wipe.classList.remove('run');
          langAnimating=false;
        },900);
      },340);
    });
  });

  /* ---------- theme toggle (dark default) ---------- */
  var themeBtn=document.getElementById('theme-btn');
  if(themeBtn){
    themeBtn.addEventListener('click',function(){
      theme = theme==='dark' ? 'light' : 'dark';
      save('tw_theme',theme);
      var html=document.documentElement;
      html.classList.add('theming');       // enables the one-shot color transition
      html.setAttribute('data-theme',theme);
      setTimeout(function(){html.classList.remove('theming');},480);
      // map tiles restyle via CSS filter — no rebuild needed
    });
  }

})();
</script>
