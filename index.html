<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <!-- No-flash theme init -->
  <script>
    (function() {
      var t = localStorage.getItem('theme') === 'light' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaelan Gu</title>
  <meta name="theme-color" content="#1F1F1E" id="meta-theme-color">

  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #1F1F1E;
      --text:       #EEEEE8;
      --btn-bg:     #3C3C3A;
      --btn-shadow: #111110;
      --btn-hi:     #5A5A58;
      --btn-lo:     #2A2A28;
    }

    [data-theme="light"] {
      --bg:         #F2EFE4;
      --text:       #1A1A18;
      --btn-bg:     #D6CEB4;
      --btn-shadow: #8A8470;
      --btn-hi:     #F2EEDD;
      --btn-lo:     #B8B09A;
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background-color 0.2s, color 0.2s;
    }

    /* ── Coming Soon ── */
    .coming-soon {
      font-family: 'Doto', monospace;
      font-weight: 900;
      font-size: clamp(1.14rem, 4.16vw, 2.5rem);
      letter-spacing: 0.55em;
      text-align: center;
      user-select: none;
      padding: 0 32px;
      line-height: 1.5;
    }

    /* ── Theme toggle ── */
    #theme-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 33px;
      height: 33px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--btn-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      /* Hard pixel shadow — no blur */
      box-shadow:
        3px 3px 0 0 var(--btn-shadow),
        inset 1px 1px 0 0 var(--btn-hi),
        inset -1px -1px 0 0 var(--btn-lo);
      transition: background-color 0.2s, box-shadow 0.2s;
      /* No transform transition — instant snap = pixel press feel */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #theme-btn.pressed {
      transform: translate(2px, 2px);
      box-shadow:
        1px 1px 0 0 var(--btn-shadow),
        inset 1px 1px 0 0 var(--btn-lo),
        inset -1px -1px 0 0 var(--btn-hi);
    }

    /* Icon visibility — CSS-driven, no JS swap needed */
    [data-theme="dark"]  .icon-sun  { display: none; }
    [data-theme="light"] .icon-moon { display: none; }
  </style>
</head>
<body>

  <button id="theme-btn" aria-label="Toggle theme">

    <!-- Moon: shown in dark mode -->
    <span class="icon-moon">
      <svg width="20" height="20" viewBox="0 0 20 20"
           xmlns="http://www.w3.org/2000/svg"
           style="display:block;transform:rotate(-45deg)"
           aria-hidden="true">
        <defs>
          <mask id="moon-mask">
            <rect width="20" height="20" fill="white"/>
            <circle cx="14" cy="10" r="7" fill="black"/>
          </mask>
        </defs>
        <circle cx="10" cy="10" r="8" fill="#C8BFEE" mask="url(#moon-mask)"/>
      </svg>
    </span>

    <!-- Sun: shown in light mode -->
    <span class="icon-sun">
      <svg width="20" height="20" viewBox="0 0 24 24"
           xmlns="http://www.w3.org/2000/svg"
           style="display:block"
           fill="#9A6200"
           aria-hidden="true">
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(0   12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(36  12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(72  12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(108 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(144 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(180 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(216 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(252 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(288 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(324 12 12)"/>
        <circle cx="12" cy="12" r="5.5"/>
      </svg>
    </span>

  </button>

  <main>
    <p class="coming-soon">COMING SOON</p>
  </main>

  <script>
    var btn = document.getElementById('theme-btn');
    var metaTheme = document.getElementById('meta-theme-color');
    var THEME_COLORS = { dark: '#1F1F1E', light: '#F2EFE4' };

    // ── Typewriter tap (Web Audio, no files) ──
    function playTap() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var sr  = ctx.sampleRate;
        // Two layers: body click + sharp attack transient
        var dur = 0.07;
        var buf = ctx.createBuffer(1, Math.floor(sr * dur), sr);
        var d   = buf.getChannelData(0);
        for (var i = 0; i < d.length; i++) {
          var t = i / sr;
          // White noise decaying fast
          d[i] = (Math.random() * 2 - 1) * Math.exp(-t / 0.008);
        }
        var src = ctx.createBufferSource();
        src.buffer = buf;

        // Bandpass around ~1 kHz → typewriter body thump
        var bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 900;
        bp.Q.value = 0.8;

        // Slight high shelf for click brightness
        var hs = ctx.createBiquadFilter();
        hs.type = 'highshelf';
        hs.frequency.value = 3000;
        hs.gain.value = 6;

        var gain = ctx.createGain();
        gain.gain.value = 0.55;

        src.connect(bp);
        bp.connect(hs);
        hs.connect(gain);
        gain.connect(ctx.destination);
        src.start();
        src.onended = function() { ctx.close(); };
      } catch(e) {}
    }

    function getTheme() {
      return document.documentElement.getAttribute('data-theme') || 'dark';
    }

    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      if (metaTheme) metaTheme.setAttribute('content', THEME_COLORS[t]);
    }

    btn.addEventListener('click', function() {
      playTap();
      applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
    });

    // Press — mouse
    btn.addEventListener('mousedown', function() { btn.classList.add('pressed'); });
    window.addEventListener('mouseup',  function() { btn.classList.remove('pressed'); });

    // Press — touch
    btn.addEventListener('touchstart', function() { btn.classList.add('pressed'); }, { passive: true });
    window.addEventListener('touchend', function() { btn.classList.remove('pressed'); });

    // Init
    applyTheme(getTheme());

    // ── Dot-level pixel flicker ──
    // Renders text to offscreen canvas at 6x font size (so Doto dots
    // have clear gaps), detects each dot centre via BFS clustering,
    // then overlays a fixed transparent canvas and randomly paints
    // bg-coloured circles to kill individual dots.
    (function() {
      var el      = document.querySelector('.coming-soon');
      var overlay = null;
      var dots    = [];
      var ftimer  = null;
      var rtimer  = null;

      function buildOverlay() {
        if (overlay) { overlay.remove(); overlay = null; }

        var rect = el.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return;

        var W  = Math.ceil(rect.width);
        var H  = Math.ceil(rect.height);
        var cs = window.getComputedStyle(el);
        var fsPx = parseFloat(cs.fontSize);

        // 6x scale gives clear inter-dot gaps in Doto font
        var SC   = 6;
        var offW = Math.ceil(W * SC);
        var offH = Math.ceil(H * SC);
        var off  = document.createElement('canvas');
        off.width = offW; off.height = offH;
        var octx = off.getContext('2d');
        octx.font = '900 ' + (fsPx * SC) + 'px Doto';
        if ('letterSpacing' in octx) octx.letterSpacing = (0.55 * fsPx * SC) + 'px';
        octx.textAlign = 'center'; octx.textBaseline = 'middle';
        octx.fillStyle = 'white';
        octx.fillText('COMING SOON', offW / 2, offH / 2);

        // BFS clustering: alpha >= 230, r=3 px — resolves individual dots
        var data    = octx.getImageData(0, 0, offW, offH).data;
        var visited = new Uint8Array(offW * offH);
        var r = 3, r2 = 9;
        dots = [];

        for (var py = 0; py < offH; py++) {
          for (var px = 0; px < offW; px++) {
            var pi = py * offW + px;
            if (visited[pi] || data[pi * 4 + 3] < 230) continue;
            var q  = [pi]; visited[pi] = 1;
            var sx = 0, sy = 0, n = 0;
            while (q.length) {
              var ci = q.pop();
              var cx = ci % offW;
              var cy = (ci - cx) / offW;
              sx += cx; sy += cy; n++;
              for (var dy = -r; dy <= r; dy++) {
                for (var dx = -r; dx <= r; dx++) {
                  if (dx*dx + dy*dy > r2) continue;
                  var nx = cx+dx, ny = cy+dy;
                  if (nx<0||nx>=offW||ny<0||ny>=offH) continue;
                  var ni = ny*offW + nx;
                  if (visited[ni] || data[ni*4+3] < 230) continue;
                  visited[ni] = 1; q.push(ni);
                }
              }
            }
            if (n > 4) dots.push({
              x: (sx / n) / SC,
              y: (sy / n) / SC,
              r: Math.sqrt(n / Math.PI) / SC * 1.2
            });
          }
        }

        // Transparent overlay canvas, fixed over the text element
        overlay = document.createElement('canvas');
        overlay.width  = W;
        overlay.height = H;
        overlay.style.cssText =
          'position:fixed;left:' + rect.left + 'px;top:' + rect.top + 'px;' +
          'width:' + W + 'px;height:' + H + 'px;pointer-events:none;z-index:10;';
        document.body.appendChild(overlay);
      }

      function flicker() {
        if (ftimer) clearTimeout(ftimer);
        if (!overlay || !dots.length) return;
        var ctx   = overlay.getContext('2d');
        var picked = [dots[Math.floor(Math.random() * dots.length)]];

        var bg = window.getComputedStyle(document.body).backgroundColor;
        picked.forEach(function(d) {
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r + 0.5, 0, Math.PI * 2);
          ctx.fillStyle = bg;
          ctx.fill();
        });

        setTimeout(function() {
          picked.forEach(function(d) {
            ctx.clearRect(d.x - d.r - 2, d.y - d.r - 2, d.r*2+4, d.r*2+4);
          });
          ftimer = setTimeout(flicker, 3000 + Math.random() * 4000);
        }, 35 + Math.random() * 80);
      }

      document.fonts.ready.then(function() {
        buildOverlay();
        if (dots.length) flicker();
      });

      window.addEventListener('resize', function() {
        clearTimeout(rtimer);
        rtimer = setTimeout(function() {
          buildOverlay();
          if (dots.length) flicker();
        }, 200);
      });
    })();
  </script>

</body>
</html>
