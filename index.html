<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <!-- No-flash theme init -->
  <script>
    (function() {
      var t = localStorage.getItem('theme') === 'light' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaelan Gu</title>
  <meta name="theme-color" content="#1F1F1E" id="meta-theme-color">

  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #1F1F1E;
      --text:       #EEEEE8;
      --btn-bg:     #3C3C3A;
      --btn-shadow: #111110;
      --btn-hi:     #5A5A58;
      --btn-lo:     #2A2A28;
    }

    [data-theme="light"] {
      --bg:         #F2EFE4;
      --text:       #1A1A18;
      --btn-bg:     #D6CEB4;
      --btn-shadow: #8A8470;
      --btn-hi:     #F2EEDD;
      --btn-lo:     #B8B09A;
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background-color 0.2s, color 0.2s;
    }

    /* ── Coming Soon ── */
    .coming-soon {
      font-family: 'Doto', monospace;
      font-weight: 700;
      font-size: clamp(0.88rem, 3.2vw, 1.92rem);
      letter-spacing: 0.55em;
      text-align: center;
      user-select: none;
      padding: 0 32px;
      line-height: 1.5;
    }

    /* ── Theme toggle ── */
    #theme-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 33px;
      height: 33px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--btn-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      /* Hard pixel shadow — no blur */
      box-shadow:
        3px 3px 0 0 var(--btn-shadow),
        inset 1px 1px 0 0 var(--btn-hi),
        inset -1px -1px 0 0 var(--btn-lo);
      transition: background-color 0.2s, box-shadow 0.2s;
      /* No transform transition — instant snap = pixel press feel */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #theme-btn.pressed {
      transform: translate(2px, 2px);
      box-shadow:
        1px 1px 0 0 var(--btn-shadow),
        inset 1px 1px 0 0 var(--btn-lo),
        inset -1px -1px 0 0 var(--btn-hi);
    }

    /* Icon visibility — CSS-driven, no JS swap needed */
    [data-theme="dark"]  .icon-sun  { display: none; }
    [data-theme="light"] .icon-moon { display: none; }
  </style>
</head>
<body>

  <button id="theme-btn" aria-label="Toggle theme">

    <!-- Moon: shown in dark mode -->
    <span class="icon-moon">
      <svg width="20" height="20" viewBox="0 0 20 20"
           xmlns="http://www.w3.org/2000/svg"
           style="display:block;transform:rotate(-45deg)"
           aria-hidden="true">
        <defs>
          <mask id="moon-mask">
            <rect width="20" height="20" fill="white"/>
            <circle cx="14" cy="10" r="7" fill="black"/>
          </mask>
        </defs>
        <circle cx="10" cy="10" r="8" fill="#C8BFEE" mask="url(#moon-mask)"/>
      </svg>
    </span>

    <!-- Sun: shown in light mode -->
    <span class="icon-sun">
      <svg width="20" height="20" viewBox="0 0 24 24"
           xmlns="http://www.w3.org/2000/svg"
           style="display:block"
           fill="#9A6200"
           aria-hidden="true">
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(0   12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(36  12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(72  12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(108 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(144 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(180 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(216 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(252 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(288 12 12)"/>
        <circle cx="12" cy="2.5" r="1.5" transform="rotate(324 12 12)"/>
        <circle cx="12" cy="12" r="5.5"/>
      </svg>
    </span>

  </button>

  <main>
    <p class="coming-soon">COMING SOON</p>
  </main>

  <script>
    var btn = document.getElementById('theme-btn');
    var metaTheme = document.getElementById('meta-theme-color');
    var THEME_COLORS = { dark: '#1F1F1E', light: '#F2EFE4' };

    // ── Typewriter tap (Web Audio, no files) ──
    function playTap() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var sr  = ctx.sampleRate;
        // Two layers: body click + sharp attack transient
        var dur = 0.07;
        var buf = ctx.createBuffer(1, Math.floor(sr * dur), sr);
        var d   = buf.getChannelData(0);
        for (var i = 0; i < d.length; i++) {
          var t = i / sr;
          // White noise decaying fast
          d[i] = (Math.random() * 2 - 1) * Math.exp(-t / 0.008);
        }
        var src = ctx.createBufferSource();
        src.buffer = buf;

        // Bandpass around ~1 kHz → typewriter body thump
        var bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 900;
        bp.Q.value = 0.8;

        // Slight high shelf for click brightness
        var hs = ctx.createBiquadFilter();
        hs.type = 'highshelf';
        hs.frequency.value = 3000;
        hs.gain.value = 6;

        var gain = ctx.createGain();
        gain.gain.value = 0.55;

        src.connect(bp);
        bp.connect(hs);
        hs.connect(gain);
        gain.connect(ctx.destination);
        src.start();
        src.onended = function() { ctx.close(); };
      } catch(e) {}
    }

    function getTheme() {
      return document.documentElement.getAttribute('data-theme') || 'dark';
    }

    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      if (metaTheme) metaTheme.setAttribute('content', THEME_COLORS[t]);
    }

    btn.addEventListener('click', function() {
      playTap();
      applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
    });

    // Press — mouse
    btn.addEventListener('mousedown', function() { btn.classList.add('pressed'); });
    window.addEventListener('mouseup',  function() { btn.classList.remove('pressed'); });

    // Press — touch
    btn.addEventListener('touchstart', function() { btn.classList.add('pressed'); }, { passive: true });
    window.addEventListener('touchend', function() { btn.classList.remove('pressed'); });

    // Init
    applyTheme(getTheme());

    // ── Pixel flicker ──
    // Split "COMING SOON" into per-character spans, then randomly
    // dim individual chars to simulate dying dot-matrix pixels.
    (function() {
      var el = document.querySelector('.coming-soon');
      var text = el.textContent;
      el.textContent = '';
      // Build spans — preserve space as non-breaking so layout holds
      var spans = [];
      for (var i = 0; i < text.length; i++) {
        var s = document.createElement('span');
        s.textContent = text[i] === ' ' ? ' ' : text[i];
        s.style.display = 'inline-block';
        el.appendChild(s);
        if (text[i] !== ' ') spans.push(s);
      }

      function scheduleFlicker() {
        var span = spans[Math.floor(Math.random() * spans.length)];
        var flickers = 1 + Math.floor(Math.random() * 3); // 1–3 rapid flickers
        var delay = 0;
        for (var f = 0; f < flickers; f++) {
          (function(d) {
            setTimeout(function() {
              span.style.opacity = (0.08 + Math.random() * 0.25).toFixed(2);
              setTimeout(function() { span.style.opacity = '1'; }, 35 + Math.random() * 55);
            }, d);
          })(delay);
          delay += 80 + Math.random() * 80;
        }
        // Next flicker event: sparse, 200ms–1.8s gap
        setTimeout(scheduleFlicker, 200 + Math.random() * 1600);
      }

      scheduleFlicker();
    })();
  </script>

</body>
</html>
